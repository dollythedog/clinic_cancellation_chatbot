# ============================================================================
# Clinic Cancellation Chatbot — Tool configuration
# ============================================================================
# This file currently exists to centralize tool configuration (ruff, pytest).
# Package/build metadata is not declared here yet; the project is still
# installed via `pip install -r requirements.txt`. A future slice may
# migrate to a full PEP 621 / build-backend setup as part of QA-01.
# ============================================================================

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    "data",
    "docs",
    ".venv",
    "alembic/versions",
]

[tool.ruff.lint]
# Start conservative: pycodestyle errors (E), pyflakes (F), import order (I),
# and a few bugbear rules (B). Additional rule sets can be enabled in
# later slices once the baseline is clean.
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # line length is enforced by the formatter, not the linter
]

# ---------------------------------------------------------------------------
# Grandfathered per-file lint dispositions (Slice 2026-04-23-05, WBS QA-01)
# ---------------------------------------------------------------------------
# Each entry below suppresses a pre-existing finding class on a specific
# file where fixing the underlying code is owned by a future slice. These
# are NOT blanket "ignore these rules everywhere" dispositions — new
# violations of the same rule in any *other* file still fail the gate.
#
# When the owning slice runs, it should (a) fix the underlying code and
# (b) remove the corresponding entry here. See `ISSUES.md` for the full
# triage narrative and owning-slice assignments.
#
# Baseline captured 2026-04-23 (ruff 0.15.9, 9 findings grandfathered).
[tool.ruff.lint.per-file-ignores]
# UP042 × 4 — `class X(str, enum.Enum)` should migrate to `enum.StrEnum`.
# Safe migration requires DB round-trip tests + API JSON round-trip tests
# to catch any MRO / serialization differences. Owning slice: dedicated
# data-layer cleanup slice (see ISSUES `RUFF-UP042`).
"app/infra/models.py" = ["UP042"]

# F821 × 3 — `To` undefined in `handle_opt_out`, `handle_help_request`,
# and the error responder. This is BUG-001, a real runtime NameError,
# NOT a style issue. Fix requires a regression test covering all three
# reply paths with Twilio signature middleware. Owning slice: APP-03
# (Twilio signature middleware), blocked on Open Question 3 (Twilio BAA).
# See ISSUES `BUG-001`.
"app/api/sms_webhook.py" = ["F821"]

# F841 × 2 — unused `patient` and `message` locals inside the incomplete
# body of `_cancel_other_offers`. Those locals will be consumed once the
# SMS-notification send path in that function is finished. Deleting them
# now means re-adding them later. Owning slice: `_cancel_other_offers`
# feature-completion slice (see ISSUES `RUFF-F841`).
"app/core/orchestrator.py" = ["F841"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
